<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accesso Riservato — Glove ICT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { background: white; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,.4); }
  .logo { width: 52px; height: 52px; background: #0F766E; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .logo svg { width: 28px; height: 28px; fill: white; }
  h2 { font-size: 1.1rem; font-weight: 800; color: #1C1917; margin-bottom: .25rem; }
  p { font-size: .85rem; color: #78716c; margin-bottom: 1.75rem; line-height: 1.5; }
  label { display: block; text-align: left; font-size: .78rem; font-weight: 700; color: #44403c; margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .06em; }
  input { width: 100%; padding: .7rem 1rem; border: 2px solid #E7E5E4; border-radius: 10px; font-size: 1.1rem; font-family: 'Courier New', monospace; letter-spacing: .15em; text-align: center; color: #1C1917; outline: none; transition: border-color .15s; }
  input:focus { border-color: #0F766E; }
  input.error { border-color: #DC2626; background: #FFF5F5; }
  button { margin-top: 1rem; width: 100%; padding: .75rem; background: #0F766E; color: white; border: none; border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .15s; font-family: inherit; }
  button:hover { background: #0D5E57; }
  .err-msg { margin-top: .75rem; font-size: .82rem; color: #DC2626; display: none; }
  .footer { margin-top: 1.5rem; font-size: .75rem; color: #A8A29E; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
  </div>
  <h2>Anteprima Riservata</h2>
  <p>Questo contenuto è riservato.<br>Inserisci il codice ricevuto via email per accedere.</p>
  <label for="code">Codice di accesso</label>
  <input type="text" id="code" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off"
    oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')"
    onkeydown="if(event.key==='Enter')verifica()">
  <button onclick="verifica()">Accedi →</button>
  <div class="err-msg" id="err">Codice non valido. Riprova o contatta Glove ICT.</div>
  <div class="footer">Glove ICT Srl · Anteprima progetto riservata</div>
</div>

<script>
const CODICI = ['STUDIO-2025', 'MEDICO-7X4K', 'GLOVE-9QR2'];

function verifica() {
  const val = document.getElementById('code').value.trim().toUpperCase();
  const input = document.getElementById('code');
  const err = document.getElementById('err');
  if (CODICI.includes(val)) {
    window.location.href = 'mockup/index.html';
  } else {
    input.classList.add('error');
    err.style.display = 'block';
    setTimeout(() => { input.classList.remove('error'); }, 2000);
  }
}
</script>
</body>
</html>
